name: Daemon installers

on:
  workflow_dispatch:
  push:
    tags:
      - "daemon-v*"

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows Squirrel
            os: windows-latest
          - name: macOS Apple Silicon
            os: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build installers
        run: npm run make:daemon

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: seekdesk-daemon-${{ runner.os }}-${{ runner.arch }}
          path: apps/daemon/out/make/**
          if-no-files-found: error
          retention-days: 14
